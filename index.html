<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartPayPlug</title>

<style>
body{
  margin:0;
  font-family:Segoe UI;
  background:#020617;
  color:#e2e8f0;
}

header{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:#020617;
  border-bottom:1px solid rgba(59,130,246,0.2);
  flex-wrap:wrap;
}

header h1{color:#60a5fa}

nav a{
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-weight:500;
}

.hero{
  padding:100px 60px;
  background:linear-gradient(135deg,#2563eb,#22c55e);
}

.hero h2{
  font-size:42px;
  margin-bottom:15px;
}

.hero p{
  font-size:16px;
  max-width:500px;
}

.btn{
  padding:12px 25px;
  background:#ffb400;
  color:black;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.section{
  padding:60px;
  text-align:center;
}

.cards{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
}

.card{
  background:#020617;
  padding:18px;
  border-radius:10px;
  margin:10px;
  border:1px solid rgba(59,130,246,0.2);
  width:200px;
}

video{
  margin-top:20px;
  border-radius:10px;
  max-width:100%;
}

/* Language Buttons */
.lang-btn{
  padding:10px 20px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#1e293b;
  color:white;
}

.lang-btn.active{
  background:linear-gradient(135deg,#2563eb,#22c55e);
}

footer{
  padding:20px;
  text-align:center;
  background:#020617;
  border-top:1px solid rgba(59,130,246,0.2);
}

/* MOBILE */
@media(max-width:768px){
  header{
    padding:20px;
    flex-direction:column;
    align-items:flex-start;
  }

  nav{
    margin-top:10px;
  }

  .hero{
    padding:60px 20px;
  }

  .hero h2{
    font-size:26px;
  }

  .section{
    padding:40px 20px;
  }
}
</style>
</head>

<body>

<header>
  <h1>⚡ SmartPayPlug</h1>
  <nav>
    <a href="#features">Features</a>
    <a href="#video">How to Use</a>
    <a href="/app/" target="_blank">Open App</a>
  </nav>
</header>

<section class="hero">
  <h2>Fast. Simple. Smart.</h2>
  <p>SmartPayPlug makes digital transactions seamless and efficient for everyone.</p>
  <br>
  <a href="/app/" target="_blank" class="btn">Launch App</a>
</section>

<section id="features" class="section">
  <h2>Key Features</h2>

  <div class="cards">
    <div class="card">🔐 Secure</div>
    <div class="card">⚡ Instant</div>
    <div class="card">📱 Easy</div>
    <div class="card">🌐 Scalable</div>
  </div>
</section>

<section id="video" class="section">
  <h2>How to Use</h2>

  <div style="margin-top:20px;">
    <button onclick="setLanguage('en')" id="btn-en" class="lang-btn active">English</button>
    <button onclick="setLanguage('ta')" id="btn-ta" class="lang-btn">தமிழ்</button>
  </div>

  <video id="tutorialVideo" width="80%" controls>
    <source id="videoSource" src="/video/tutorial-en.mp4" type="video/mp4">
  </video>
</section>

<section class="section">
  <h2>Get Started</h2>
  <a href="/app/" target="_blank" class="btn">Access Platform</a>
</section>

<footer>
  <p>© 2026 SmartPayPlug</p>
</footer>

<script>
function setLanguage(lang){
  const video = document.getElementById("tutorialVideo");
  const source = document.getElementById("videoSource");

  source.src = lang === "ta"
    ? "/video/tutorial-ta.mp4"
    : "/video/tutorial-en.mp4";

  video.load();
  video.play();

  document.getElementById("btn-en").classList.remove("active");
  document.getElementById("btn-ta").classList.remove("active");
  document.getElementById("btn-" + lang).classList.add("active");
}

const userLang = navigator.language || navigator.userLanguage;
if(userLang && userLang.toLowerCase().includes("ta")){
  setLanguage("ta");
}
</script>

</body>
</html>
